name: Build Angular App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-angular:
    runs-on: ubuntu-latest

    concurrency:
      group: ci-${{ github.workflow }}
      cancel-in-progress: true

    steps:
      
      - uses: actions/checkout@v4

      - name: Set up build env
        id: setupbuild
        uses: sasikiran0601/Setup-Python-and-Node-Env@v1
        with:
           pythonVersion: 3.10
           nodejsVerison: 18
      - name: Output from the Set up build env
        run: |
          echo "Repository owner = ${{steps.setupbuild.outputs.repoOwner}}"
          echo "BRANCH = ${{steps.setupbuild.outputs.branch}}"
          echo "CICD key = ${{steps.setupbuild.outputs.CICDkey}}"
        

      
